site_name: SolarTracer MQTT
site_description: EPEVER Tracer BN RS-485 reader with MQTT and Home Assistant integration
site_url: https://carefreeinv.github.io/epever-tracer-mqtt/
repo_url: https://github.com/carefreeinv/epever-tracer-mqtt
repo_name: carefreeinv/epever-tracer-mqtt
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.top
    - search.suggest
    - toc.follow

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.snippets:
      base_path: ['.']
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Installation: installation.md
  - Configuration: configuration.md
  - Home Assistant: home-assistant.md
  - Dashboard: dashboard.md
  - Troubleshooting: troubleshooting.md
  - Changelog: changelog.md
  - Upstream: upstream.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/carefreeinv/epever-tracer-mqtt